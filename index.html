<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v6.2 Assistente IA Offline (Gemma-4 LiteRT)</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --border-color: #333;
            --text-main: #e0e0e0;
            --accent: #007acc;
            --status-warn: #ffa500;
            --status-err: #ff4d4d;
            --status-ok: #00e676;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            padding: 20px; 
            margin: 0; 
        }
        .container { max-width: 900px; margin: 0 auto; }
        #status-bar { 
            padding: 15px; 
            margin-bottom: 15px; 
            background: var(--bg-card); 
            border-left: 6px solid var(--status-warn); 
            font-weight: bold; 
            color: var(--status-warn); 
            border-radius: 4px; 
            transition: all 0.2s ease; 
        }
        .panel { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            padding: 15px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
        }
        #chat { 
            height: 400px; 
            overflow-y: auto; 
            border: 1px solid var(--border-color); 
            padding: 15px; 
            margin-bottom: 15px; 
            background: #0a0a0a; 
            border-radius: 4px; 
        }
        .input-group { display: flex; gap: 10px; }
        #input { 
            flex: 1; 
            padding: 12px; 
            background: #252525; 
            color: #fff; 
            border: 1px solid var(--border-color); 
            border-radius: 4px; 
            font-size: 16px; 
        }
        #input:disabled { opacity: 0.5; cursor: not-allowed; }
        button { 
            padding: 12px 24px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background 0.2s; 
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .error-log { 
            color: var(--status-err); 
            background: rgba(255, 77, 77, 0.08); 
            border: 1px solid rgba(255, 77, 77, 0.3); 
            padding: 12px; 
            border-radius: 4px; 
            margin-top: 12px; 
            font-family: monospace; 
            display: none; 
            font-size: 13px; 
            white-space: pre-wrap; 
            word-break: break-all; 
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Assistente IA Offline (Gemma-4 E4B LiteRT)</h2>
    
    <div id="status-bar">Status: Executando análises preliminares de hardware...</div>

    <div class="panel">
        <label style="font-weight: bold; display: block; margin-bottom: 10px;">Carga do Modelo Local (.task):</label>
        <input type="file" id="modelFile" accept=".task" autocomplete="off" disabled>
        <div id="log-panel" class="error-log"></div>
    </div>

    <div id="chat">Aguardando a validação do ambiente de runtime...</div>
    
    <div class="input-group">
        <input type="text" id="input" placeholder="Aguardando ativação do modelo..." disabled autocomplete="off">
        <button id="send" disabled>Enviar</button>
    </div>
</div>

<script type="module">
    // =========================================================================
    // PROTOCOLO DE INTERCEPTAÇÃO E COMPATIBILIDADE WEBGPU (CHROME/EDGE/OPERA 2026)
    // =========================================================================
    if (typeof GPUAdapter !== 'undefined' && !GPUAdapter.prototype.requestAdapterInfo) {
        GPUAdapter.prototype.requestAdapterInfo = async function() {
            return this.info || { device: "Mapeador Genérico WebGPU", architecture: "Desconhecida" };
        };
    }

    if (typeof GPUDevice !== 'undefined') {
        Object.defineProperty(GPUDevice.prototype, 'adapterInfo', {
            get() {
                return this._shadowAdapterInfo || this.info || { device: "Mapeador Genérico WebGPU" };
            },
            set(value) {
                this._shadowAdapterInfo = value;
            },
            configurable: true
        });
    }
    // =========================================================================

    const statusBar = document.getElementById('status-bar');
    const fileInput = document.getElementById('modelFile');
    const logPanel = document.getElementById('log-panel');
    const chatDiv = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    fileInput.value = '';

    function emitFatalError(title, exception) {
        statusBar.style.borderLeftColor = "var(--status-err)";
        statusBar.style.color = "var(--status-err)";
        statusBar.innerText = `Erro Fatal: ${title}`;
        logPanel.style.display = "block";
        logPanel.innerText = `[EXCEÇÃO TRATADA]\nOrigem: ${title}\nMensagem: ${exception.message || exception}\nStack: ${exception.stack || 'Nenhum rastreamento'}\nTimestamp: ${new Date().toISOString()}`;
    }

    if (!navigator.gpu) {
        emitFatalError(
            "API WebGPU Indisponível", 
            "O navegador atual não expõe o subsistema WebGPU. Ative a aceleração por hardware nas configurações do navegador."
        );
        chatDiv.innerHTML = `<p style="color:var(--status-err)"><b>Falha Crítica:</b> A arquitetura local do Gemma-4 necessita obrigatoriamente de WebGPU ativa.</p>`;
    } else {
        initializeApplication();
    }

    async function initializeApplication() {
        let FilesetResolver, LlmInference;
        try {
            statusBar.innerText = "Status: Carregando motor de inferência local...";
            
            const mediaPipeGlue = await import('./index.js');
            FilesetResolver = mediaPipeGlue.FilesetResolver;
            LlmInference = mediaPipeGlue.LlmInference;
            
        } catch (err) {
            emitFatalError("Falha ao carregar scripts locais", err);
            chatDiv.innerHTML = `<p style="color:var(--status-err)"><b>Erro de Inicialização:</b> Não foi possível ler o arquivo ./index.js local no GitHub Pages.</p>`;
            return;
        }

        if (!FilesetResolver || !LlmInference) {
            emitFatalError("Mapeamento Inválido", new Error("Objetos de inicialização ausentes dentro do index.js."));
            return;
        }
        
        statusBar.style.borderLeftColor = "var(--status-warn)";
        statusBar.style.color = "var(--status-warn)";
        statusBar.innerText = "Status: Módulos prontos. Aguardando arquivo Gemma-4 (.task)...";
        chatDiv.innerHTML = "<p><b>Sistema:</b> Pronto para carga de arquivos virtuais. Insira o modelo Gemma-4 baixado do LiteRT.</p>";
        fileInput.disabled = false;
        
        setupFileListener(FilesetResolver, LlmInference);
    }

    function setupFileListener(FilesetResolver, LlmInference) {
        let llmInferenceInstance = null;

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size === 0) {
                emitFatalError("Buffer Nulo", new Error("O arquivo selecionado possui 0 bytes ou está corrompido."));
                fileInput.value = '';
                return;
            }

            try {
                fileInput.disabled = true;
                logPanel.style.display = "none";
                statusBar.innerText = `Status: Indexando ponteiro de "${file.name}"...`;
                chatDiv.innerHTML = "<p><i>Mapeando fluxo virtual de tensores (Blob streaming)...</i></p>";
                
                await new Promise(resolve => setTimeout(resolve, 100));
                const modelUrl = URL.createObjectURL(file);

                statusBar.innerText = "Status: Vinculando binários WebAssembly locais (.wasm)...";
                await new Promise(resolve => setTimeout(resolve, 60));

                const genAiFileset = await FilesetResolver.forGenAiTasks('./wasm');

                statusBar.innerText = "Status: Alocando tensores Gemma-4 e compilando shaders WebGPU...";
                await new Promise(resolve => setTimeout(resolve, 60));

                // Configurações específicas para evitar estouro de dimensões de grafos do LiteRT
                llmInferenceInstance = await LlmInference.createFromOptions(genAiFileset, {
                    baseOptions: { modelAssetPath: modelUrl },
                    maxTokens: 1024,
                    topK: 30,
                    temperature: 0.6,
                    randomSeed: Math.floor(Math.random() * 1000)
                });

                statusBar.style.borderLeftColor = "var(--status-ok)";
                statusBar.style.color = "var(--status-ok)";
                statusBar.innerText = "Status: Pipeline de Inferência Concluído.";
                chatDiv.innerHTML = "<p style='color:var(--status-ok);'><b>Sistema:</b> Ligação estrita concluída. O modelo Gemma-4 está alocado na sua VRAM local. Você pode desconectar a internet.</p>";
                
                const activeInput = document.getElementById('input');
                const activeSend = document.getElementById('send');
                
                activeInput.placeholder = "Pergunte algo ao Gemma-4 local...";
                activeInput.disabled = false;
                activeSend.disabled = false;
                activeInput.focus();

                setupChatEngine(llmInferenceInstance);

            } catch (error) {
                fileInput.disabled = false;
                fileInput.value = '';
                emitFatalError("Falha Crítica na Alocação das Camadas do Modelo", error);
                chatDiv.innerHTML = `<p style="color:var(--status-err)"><b>Erro de Grafo:</b> O tamanho ou a assinatura das matrizes de pesos do arquivo difere do esperado pelo módulo WASM atual. Certifique-se de usar uma versão compatível do index.js ou use um modelo estável.</p>`;
            }
        });
    }

    function setupChatEngine(llmInference) {
        async function runPipeline() {
            const currentInput = document.getElementById('input');
            const currentSend = document.getElementById('send');
            
            const prompt = currentInput.value.trim();
            if (!prompt) return;

            chatDiv.innerHTML += `<p><b>Você:</b> ${prompt}</p>`;
            currentInput.value = '';

            const responseWrapper = document.createElement('p');
            responseWrapper.innerHTML = '<b>IA:</b> <i>Processando tensores locais...</i>';
            chatDiv.appendChild(responseWrapper);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            currentInput.disabled = true;
            currentSend.disabled = true;

            try {
                let streamingTriggered = false;
                
                const fullResponse = await llmInference.generateResponse(prompt, (partialText, isComplete) => {
                    streamingTriggered = true;
                    // Filtra marcações estranhas residuais da compilação do tokenizador
                    responseWrapper.innerHTML = `<b>IA:</b> ${partialText.replace(/<br>/g, '\n')}`;
                    chatDiv.scrollTop = chatDiv.scrollHeight;

                    if (isComplete) {
                        currentInput.disabled = false;
                        currentSend.disabled = false;
                        currentInput.focus();
                    }
                });

                if (!streamingTriggered && fullResponse) {
                    responseWrapper.innerHTML = `<b>IA:</b> ${fullResponse}`;
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                    currentInput.disabled = false;
                    currentSend.disabled = false;
                    currentInput.focus();
                }
            } catch (runtimeError) {
                responseWrapper.innerHTML = `<b>IA:</b> <span style="color:var(--status-err);"><br>[Erro Crítico de Execução]: ${runtimeError.message}</span>`;
                currentInput.disabled = false;
                currentSend.disabled = false;
                currentInput.focus();
            }
        }

        const currentSendBtn = document.getElementById('send');
        const currentInputEl = document.getElementById('input');

        currentSendBtn.replaceWith(currentSendBtn.cloneNode(true));
        currentInputEl.replaceWith(currentInputEl.cloneNode(true));

        const newSendBtn = document.getElementById('send');
        const newInputEl = document.getElementById('input');

        newSendBtn.addEventListener('click', runPipeline);
        newInputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') runPipeline(); });
    }

    window.addEventListener('unhandledrejection', (e) => {
        emitFatalError("Rejeição Global Não Capturada", e.reason);
    });
</script>
</body>
</html>
