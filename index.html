<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v6.3 Assistente IA Offline (Gemma Multi-Engine)</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --border-color: #333;
            --text-main: #e0e0e0;
            --accent: #007acc;
            --status-warn: #ffa500;
            --status-err: #ff4d4d;
            --status-ok: #00e676;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            padding: 20px; 
            margin: 0; 
        }
        .container { max-width: 900px; margin: 0 auto; }
        #status-bar { 
            padding: 15px; 
            margin-bottom: 15px; 
            background: var(--bg-card); 
            border-left: 6px solid var(--status-warn); 
            font-weight: bold; 
            color: var(--status-warn); 
            border-radius: 4px; 
            transition: all 0.2s ease; 
        }
        .panel { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            padding: 15px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
        }
        #chat { 
            height: 400px; 
            overflow-y: auto; 
            border: 1px solid var(--border-color); 
            padding: 15px; 
            margin-bottom: 15px; 
            background: #0a0a0a; 
            border-radius: 4px; 
        }
        .input-group { display: flex; gap: 10px; }
        #input { 
            flex: 1; 
            padding: 12px; 
            background: #252525; 
            color: #fff; 
            border: 1px solid var(--border-color); 
            border-radius: 4px; 
            font-size: 16px; 
        }
        #input:disabled { opacity: 0.5; cursor: not-allowed; }
        button { 
            padding: 12px 24px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background 0.2s; 
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .error-log { 
            color: var(--status-err); 
            background: rgba(255, 77, 77, 0.08); 
            border: 1px solid rgba(255, 77, 77, 0.3); 
            padding: 12px; 
            border-radius: 4px; 
            margin-top: 12px; 
            font-family: monospace; 
            display: none; 
            font-size: 13px; 
            white-space: pre-wrap; 
            word-break: break-all; 
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Assistente IA Offline (Gemma Web Engine)</h2>
    
    <div id="status-bar">Status: Validando subsistema gráfico do dispositivo...</div>

    <div class="panel">
        <label style="font-weight: bold; display: block; margin-bottom: 10px;">Carga do Modelo Local (.task):</label>
        <input type="file" id="modelFile" accept=".task" autocomplete="off" disabled>
        <div id="log-panel" class="error-log"></div>
    </div>

    <div id="chat">Aguardando inicialização da engine WebAssembly...</div>
    
    <div class="input-group">
        <input type="text" id="input" placeholder="Selecione o modelo para iniciar..." disabled autocomplete="off">
        <button id="send" disabled>Enviar</button>
    </div>
</div>

<script type="module">
    const statusBar = document.getElementById('status-bar');
    const fileInput = document.getElementById('modelFile');
    const logPanel = document.getElementById('log-panel');
    const chatDiv = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    fileInput.value = '';

    function emitFatalError(title, exception) {
        statusBar.style.borderLeftColor = "var(--status-err)";
        statusBar.style.color = "var(--status-err)";
        statusBar.innerText = `Erro Fatal: ${title}`;
        logPanel.style.display = "block";
        logPanel.innerText = `[EXCEÇÃO DE RUNTIME]\nOrigem: ${title}\nMensagem: ${exception.message || exception}\nTimestamp: ${new Date().toISOString()}`;
    }

    if (!navigator.gpu) {
        emitFatalError("WebGPU Indisponível", "Ative a aceleração de hardware nas configurações globais do seu navegador.");
        chatDiv.innerHTML = `<p style="color:var(--status-err)"><b>Falha Crítica:</b> WebGPU necessária para alocar tensores locais.</p>`;
    } else {
        initializeApplication();
    }

    async function initializeApplication() {
        let FilesetResolver, LlmInference;
        try {
            statusBar.innerText = "Status: Importando módulos locais do MediaPipe...";
            
            const mediaPipeGlue = await import('./index.js');
            FilesetResolver = mediaPipeGlue.FilesetResolver;
            LlmInference = mediaPipeGlue.LlmInference;
            
        } catch (err) {
            emitFatalError("Erro de Linkagem de Script", err);
            chatDiv.innerHTML = `<p style="color:var(--status-err)"><b>Erro:</b> Certifique-se de que os arquivos index.js e a pasta /wasm estão atualizados na raiz do repositório.</p>`;
            return;
        }

        statusBar.style.borderLeftColor = "var(--status-warn)";
        statusBar.style.color = "var(--status-warn)";
        statusBar.innerText = "Status: Pronto. Carregue o modelo gemma3 ou gemma-4...";
        chatDiv.innerHTML = "<p><b>Sistema:</b> Módulos carregados com sucesso. Insira o seu arquivo .task local.</p>";
        fileInput.disabled = false;
        
        setupFileListener(FilesetResolver, LlmInference);
    }

    function setupFileListener(FilesetResolver, LlmInference) {
        let llmInferenceInstance = null;

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                fileInput.disabled = true;
                logPanel.style.display = "none";
                statusBar.innerText = `Status: Lendo bytes de "${file.name}"...`;
                chatDiv.innerHTML = "<p><i>Alocando espaço em memória e gerando URL virtual do arquivo...</i></p>";
                
                await new Promise(resolve => setTimeout(resolve, 100));
                const modelUrl = URL.createObjectURL(file);

                statusBar.innerText = "Status: Vinculando binários WebAssembly da pasta /wasm...";
                const genAiFileset = await FilesetResolver.forGenAiTasks('./wasm');

                statusBar.innerText = "Status: Compilando shaders WebGPU e injetando tensores...";
                await new Promise(resolve => setTimeout(resolve, 100));

                llmInferenceInstance = await LlmInference.createFromOptions(genAiFileset, {
                    baseOptions: { modelAssetPath: modelUrl },
                    maxTokens: 512, // Otimizado para modelos de 1B/4B int4 evitarem OOM em GPUs locais
                    topK: 40,
                    temperature: 0.6
                });

                statusBar.style.borderLeftColor = "var(--status-ok)";
                statusBar.style.color = "var(--status-ok)";
                statusBar.innerText = "Status: Pipeline de Inferência Ativo.";
                chatDiv.innerHTML = "<p style='color:var(--status-ok);'><b>Sistema:</b> Ligação concluída com sucesso. O modelo está ativo na GPU local.</p>";
                
                const activeInput = document.getElementById('input');
                const activeSend = document.getElementById('send');
                
                activeInput.placeholder = "Pergunte algo ao modelo local...";
                activeInput.disabled = false;
                activeSend.disabled = false;
                activeInput.focus();

                setupChatEngine(llmInferenceInstance);

            } catch (error) {
                fileInput.disabled = false;
                fileInput.value = '';
                emitFatalError("Falha na Inicialização do Grafo", error);
                chatDiv.innerHTML = `<p style="color:var(--status-err)"><b>Erro de Pipeline:</b> Ocorreu um travamento interno. Verifique se os arquivos dentro da pasta /wasm pertencem à mesma versão estável da biblioteca.</p>`;
            }
        });
    }

    function setupChatEngine(llmInference) {
        async function runPipeline() {
            const currentInput = document.getElementById('input');
            const currentSend = document.getElementById('send');
            
            const prompt = currentInput.value.trim();
            if (!prompt) return;

            chatDiv.innerHTML += `<p><b>Você:</b> ${prompt}</p>`;
            currentInput.value = '';

            const responseWrapper = document.createElement('p');
            responseWrapper.innerHTML = '<b>IA:</b> <i>Processando resposta...</i>';
            chatDiv.appendChild(responseWrapper);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            currentInput.disabled = true;
            currentSend.disabled = true;

            try {
                let streamingTriggered = false;
                
                await llmInference.generateResponse(prompt, (partialText, isComplete) => {
                    streamingTriggered = true;
                    responseWrapper.innerHTML = `<b>IA:</b> ${partialText}`;
                    chatDiv.scrollTop = chatDiv.scrollHeight;

                    if (isComplete) {
                        currentInput.disabled = false;
                        currentSend.disabled = false;
                        currentInput.focus();
                    }
                });
            } catch (runtimeError) {
                responseWrapper.innerHTML = `<b>IA:</b> <span style="color:var(--status-err);"><br>[Erro de Execução]: ${runtimeError.message}</span>`;
                currentInput.disabled = false;
                currentSend.disabled = false;
                currentInput.focus();
            }
        }

        const currentSendBtn = document.getElementById('send');
        const currentInputEl = document.getElementById('input');

        currentSendBtn.replaceWith(currentSendBtn.cloneNode(true));
        currentInputEl.replaceWith(currentInputEl.cloneNode(true));

        document.getElementById('send').addEventListener('click', runPipeline);
        document.getElementById('input').addEventListener('keypress', (e) => { if (e.key === 'Enter') runPipeline(); });
    }
</script>
</body>
</html>
