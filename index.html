<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v5.1 Assistente IA Offline (Gemma-4)</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --border-color: #333;
            --text-main: #e0e0e0;
            --accent: #007acc;
            --status-warn: #ffa500;
            --status-err: #ff4d4d;
            --status-ok: #00e676;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        #status-bar { padding: 15px; margin-bottom: 15px; background: var(--bg-card); border-left: 6px solid var(--status-warn); font-weight: bold; color: var(--status-warn); border-radius: 4px; transition: all 0.2s ease; }
        .panel { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        #chat { height: 400px; overflow-y: auto; border: 1px solid var(--border-color); padding: 15px; margin-bottom: 15px; background: #0a0a0a; border-radius: 4px; }
        .input-group { display: flex; gap: 10px; }
        #input { flex: 1; padding: 12px; background: #252525; color: #fff; border: 1px solid var(--border-color); border-radius: 4px; font-size: 16px; }
        #input:disabled { opacity: 0.5; cursor: not-allowed; }
        button { padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .error-log { color: var(--status-err); background: rgba(255, 77, 77, 0.08); border: 1px solid rgba(255, 77, 77, 0.3); padding: 12px; border-radius: 4px; margin-top: 12px; font-family: monospace; display: none; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
<div class="container">
    <h2>Assistente IA Offline (Gemma-4)</h2>
    
    <div id="status-bar">Status: Executando análises preliminares de hardware...</div>

    <div class="panel">
        <label style="font-weight: bold; display: block; margin-bottom: 10px;">Carga do Modelo Local (.task):</label>
        <input type="file" id="modelFile" accept=".task" autocomplete="off" disabled>
        <div id="log-panel" class="error-log"></div>
    </div>

    <div id="chat">Aguardando a validação do ambiente de runtime...</div>
    
    <div class="input-group">
        <input type="text" id="input" placeholder="Aguardando ativação do modelo..." disabled autocomplete="off">
        <button id="send" disabled>Enviar</button>
    </div>
</div>

<script type="module">
    const statusBar = document.getElementById('status-bar');
    const fileInput = document.getElementById('modelFile');
    const logPanel = document.getElementById('log-panel');
    const chatDiv = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    // Sanitização de persistência colateral de formulário do navegador
    fileInput.value = '';

    function emitFatalError(title, exception) {
        statusBar.style.borderLeftColor = "var(--status-err)";
        statusBar.style.color = "var(--status-err)";
        statusBar.innerText = `Erro Fatal: ${title}`;
        logPanel.style.display = "block";
        logPanel.innerText = `[EXCEÇÃO TRATADA]\nOrigem: ${title}\nMensagem: ${exception.message || exception}\nStack: ${exception.stack || 'Nenhum rastreamento disponível'}\nTimestamp: ${new Date().toISOString()}`;
    }

    // Camada 1: Auditoria de Subsistema Gráfico (WebGPU)
    if (!navigator.gpu) {
        emitFatalError(
            "API WebGPU Indisponível", 
            "O navegador atual não expõe o subsistema WebGPU. Verifique se: 1. Está utilizando Chrome/Edge v113+. 2. A aceleração de hardware está active no navegador. 3. Os drivers da GPU estão atualizados."
        );
        chatDiv.innerHTML = `<p style="color:var(--status-err)"><b>Falha Crítica de Hardware:</b> A arquitetura de tensores locais do MediaPipe GenAI necessita obrigatoriamente de WebGPU ativa no host.</p>`;
    } else {
        // Camada 2: Inicialização Local da Aplicação
        initializeApplication();
    }

    async function initializeApplication() {
        let FilesetResolver, LlmInference;
        try {
            statusBar.innerText = "Status: Carregando motor de IA local...";
            
            // Importação do arquivo local index.js unificado na raiz do seu GitHub
            const mediaPipeGlue = await import('./index.js');
            
            FilesetResolver = mediaPipeGlue.FilesetResolver;
            LlmInference = mediaPipeGlue.LlmInference;
            
        } catch (err) {
            emitFatalError("Falha ao carregar scripts locais", err);
            chatDiv.innerHTML = `<p style="color:var(--status-err)"><b>Erro de Inicialização:</b> Não foi possível ler o arquivo ./index.js. Verifique se ele foi enviado corretamente para o repositório.</p>`;
            return;
        }

        // Validação das propriedades centrais de inferência
        if (!FilesetResolver || !LlmInference) {
            emitFatalError("Mapeamento de Escopo Inválido", new Error("O script local foi baixado, mas os objetos FilesetResolver ou LlmInference estão ausentes."));
            return;
        }
        
        statusBar.style.borderLeftColor = "var(--status-warn)";
        statusBar.style.color = "var(--status-warn)";
        statusBar.innerText = "Status: Módulos prontos. Aguardando injeção do arquivo (.task)...";
        chatDiv.innerHTML = "<p><b>Sistema:</b> Ambiente inicializado com sucesso. Clique em 'Escolher arquivo' para mapear o seu modelo local na memória do interpretador.</p>";
        fileInput.disabled = false;
        
        setupFileListener(FilesetResolver, LlmInference);
    }

    function setupFileListener(FilesetResolver, LlmInference) {
        let llmInferenceInstance;

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Camada 3: Validação Volumétrica Preventiva
            if (file.size === 0) {
                emitFatalError("Buffer de Arquivo Corrompido", new Error("O arquivo selecionado possui comprimento estrito de 0 bytes. Download incompleto."));
                fileInput.value = '';
                return;
            }

            try {
                fileInput.disabled = true;
                logPanel.style.display = "none";
                statusBar.innerText = `Status: Lendo chunks binários de "${file.name}"...`;
                chatDiv.innerHTML = "<p><i>Extraindo payload de dados e gerando ArrayBuffer local...</i></p>";
                
                await new Promise(resolve => setTimeout(resolve, 120)); // Força ciclo de repintura da UI

                const arrayBuffer = await file.arrayBuffer();
                const modelBuffer = new Uint8Array(arrayBuffer);

                statusBar.innerText = "Status: Vinculando binários auxiliares WebAssembly locais (.wasm)...";
                await new Promise(resolve => setTimeout(resolve, 60));

                // Redirecionamento estrito para buscar os binários WebAssembly na sua pasta local /wasm
                const genAiFileset = await FilesetResolver.forGenAiTasks('./wasm');

                statusBar.innerText = "Status: Alocando tensores e compilando shaders na WebGPU (VRAM)...";
                await new Promise(resolve => setTimeout(resolve, 60));

                llmInferenceInstance = await LlmInference.createFromOptions(genAiFileset, {
                    baseOptions: { modelAssetBuffer: modelBuffer },
                    maxTokens: 2048,
                    topK: 40,
                    temperature: 0.7
                });

                statusBar.style.borderLeftColor = "var(--status-ok)";
                statusBar.style.color = "var(--status-ok)";
                statusBar.innerText = "Status: Sistema de Inferência Ativo e Prontificado.";
                chatDiv.innerHTML = "<p style='color:var(--status-ok);'><b>Sistema:</b> Ligação estrita concluída. O modelo está hospedado em sua GPU local. Barramento de rede liberado para desconexão total.</p>";
                
                inputEl.placeholder = "Digite sua mensagem e pressione Enter...";
                inputEl.disabled = false;
                sendBtn.disabled = false;
                inputEl.focus();

                setupChatEngine(llmInferenceInstance);

            } catch (error) {
                fileInput.disabled = false;
                fileInput.value = '';
                emitFatalError("Falha na Instanciação do Grafo de Inferência", error);
                chatDiv.innerHTML = `<p style="color:var(--status-err)"><b>Erro de Pipeline:</b> A injeção de tensores falhou. Isto ocorre devido a falta de VRAM livre no dispositivo ou desalinhamento estrutural dos arquivos na pasta ./wasm.</p>`;
            }
        });
    }

    function setupChatEngine(llmInference) {
        async function runPipeline() {
            const prompt = inputEl.value.trim();
            if (!prompt) return;

            chatDiv.innerHTML += `<p><b>Você:</b> ${prompt}</p>`;
            inputEl.value = '';

            const responseWrapper = document.createElement('p');
            responseWrapper.innerHTML = '<b>IA:</b> ';
            chatDiv.appendChild(responseWrapper);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            inputEl.disabled = true;
            sendBtn.disabled = true;

            try {
                await llmInference.generateResponse(prompt, (partialText, isComplete) => {
                    responseWrapper.innerHTML = `<b>IA:</b> ${partialText}`;
                    chatDiv.scrollTop = chatDiv.scrollHeight;

                    if (isComplete) {
                        inputEl.disabled = false;
                        sendBtn.disabled = false;
                        inputEl.focus();
                    }
                });
            } catch (runtimeError) {
                responseWrapper.innerHTML += `<span style="color:var(--status-err);"><br>[Erro Crítico de Runtime]: ${runtimeError.message}</span>`;
                inputEl.disabled = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        sendBtn.replaceWith(sendBtn.cloneNode(true));
        inputEl.replaceWith(inputEl.cloneNode(true));

        const newSendBtn = document.getElementById('send');
        const newInputEl = document.getElementById('input');

        newSendBtn.addEventListener('click', runPipeline);
        newInputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') runPipeline(); });
    }

    // Monitoramento reativo global para falhas assíncronas externas (unhandled rejections)
    window.addEventListener('unhandledrejection', (e) => {
        emitFatalError("Rejeição Assíncrona Não Tratada no Loop Global", e.reason);
    });
</script>
</body>
</html>
